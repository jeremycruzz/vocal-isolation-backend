services:
  api:
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ../cap-frontend
      dockerfile: Dockerfile
      args:
        VITE_SEPARATE_API_URL: http://localhost:8000
        VITE_API_URL: http://localhost:3000
    ports:
      - "80:80"
    restart: unless-stopped
