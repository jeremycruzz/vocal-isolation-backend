services:
  api:
    build: .
    container_name: cap-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ../cap-frontend
      dockerfile: Dockerfile
      args:
        # Same origin so nginx proxies /separate to api
        VITE_SEPARATE_API_URL: http://localhost:8080
        VITE_API_URL: http://localhost:8080
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
