# Override for frontend dev with live reload. Run from cap-backend:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Frontend: http://localhost:5173 (Vite HMR). API: http://localhost:8000
services:
  frontend:
    build:
      context: ../cap-frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ../cap-frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

volumes:
  frontend_node_modules:
    name: cap-frontend_node_modules
